<main class="main">
        <div class="tool-rmbg" x-data="rmbgTool()">
        <!-- Upload Section -->
        <section class="section upload-section" x-show="step === 'upload'" x-cloak>
            <div class="upload-card glass-card">
                <div
                    class="drop-zone"
                    :class="{ dragover: dragover }"
                    @dragenter.prevent="dragover = true"
                    @dragover.prevent="dragover = true"
                    @dragleave.prevent="dragover = false"
                    @drop.prevent="dragover = false; onDrop($event)"
                    @click="pickFile()"
                >
                    <div class="drop-zone-content">
                        <div class="upload-icon">
                            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="32" cy="32" r="30" stroke="url(#up-grad)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
                                <path d="M32 20V44M20 32L32 20L44 32" stroke="url(#up-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <defs>
                                    <linearGradient id="up-grad" x1="0" y1="0" x2="64" y2="64">
                                        <stop stop-color="#6366f1"/>
                                        <stop offset="1" stop-color="#a855f7"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <h2 class="drop-zone-title">Drop your image here</h2>
                        <p class="drop-zone-subtitle">or <span class="browse-link">browse files</span></p>
                        <p class="drop-zone-hint">Supports PNG, JPG, WEBP, BMP, TIFF — Max 20 MB</p>
                    </div>
                    <input x-ref="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/bmp,image/tiff" hidden @change="onFileChange()">
                </div>
            </div>
        </section>

        <section class="section processing-section" x-show="step === 'processing'" x-cloak>
            <div class="glass-card processing-card">
                <div class="spinner"></div>
                <h2 class="processing-title">Removing background…</h2>
                <p class="processing-subtitle">This may take a moment depending on image size</p>
            </div>
        </section>

        <section class="section result-section" x-show="step === 'result'" x-cloak>
            <div class="result-container">
                <div class="comparison-grid">
                    <div class="comparison-card glass-card">
                        <span class="comparison-label">Original</span>
                        <div class="image-wrapper">
                            <img :src="originalPreviewUrl" alt="Original image">
                        </div>
                    </div>
                    <div class="comparison-card glass-card">
                        <span class="comparison-label result-label">Result</span>
                        <div
                            x-ref="resultWrapper"
                            class="image-wrapper"
                            :class="{ 'checkered-bg': !activeBgColor }"
                        >
                            <img :src="resultBlobUrl || ''" alt="Background removed">
                        </div>
                    </div>
                </div>

                <div class="background-tools glass-card">
                    <div class="background-tools-row layout-row layout-row--between layout-row--center">
                        <div class="background-tools-label">
                            <span class="background-tools-title">Background color</span>
                            <span class="background-tools-subtitle">Fill transparent areas with a solid color</span>
                        </div>
                        <div class="background-tools-controls">
                            <div class="color-picker-wrapper">
                                <input x-ref="bgColorPicker" type="color" value="#ffffff" aria-label="Pick background color" @input="onBgColorInput()">
                            </div>
                            <div class="hex-input-wrapper">
                                <span class="hex-prefix">#</span>
                                <input
                                    x-ref="bgHexInput"
                                    type="text"
                                    maxlength="6"
                                    placeholder="ffffff"
                                    aria-label="Enter hex color (e.g. ffffff)"
                                    autocomplete="off"
                                    spellcheck="false"
                                    @input="onBgHexInput()"
                                    @blur="onBgHexBlur()"
                                >
                            </div>
                            <button class="btn btn-tertiary" type="button" @click="activeBgColor = null; resetResultBackground()">
                                Reset
                            </button>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button type="button" class="btn btn-primary" @click="downloadPng()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download PNG
                    </button>
                    <button type="button" class="btn btn-secondary" @click="downloadColored()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <path d="M3 17l6-6 4 4 8-8"/>
                        </svg>
                        Download with Background
                    </button>
                    <button type="button" class="btn btn-secondary" @click="goToUpload()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
                        </svg>
                        New Image
                    </button>
                </div>
            </div>
        </section>

        <div id="error-toast" class="error-toast" :class="{ visible: toastVisible }" x-ref="errorToast">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span x-text="toastMessage"></span>
        </div>
        </div>
</main>
<footer class="footer">
        <p>Powered by <a href="https://huggingface.co/briaai/RMBG-2.0" target="_blank" rel="noopener">BRIA RMBG 2.0</a></p>
</footer>

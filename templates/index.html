<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Remove image backgrounds instantly with AI-powered RMBG 2.0. Free, fast, and high quality.">
    <title>RMBG 2.0 — AI Background Remover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="32" height="32" rx="8" fill="url(#logo-grad)"/>
                        <path d="M8 16C8 11.58 11.58 8 16 8V16H24C24 20.42 20.42 24 16 24C11.58 24 8 20.42 8 16Z" fill="white" fill-opacity="0.9"/>
                        <path d="M16 8C20.42 8 24 11.58 24 16H16V8Z" fill="white" fill-opacity="0.5"/>
                        <defs>
                            <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32">
                                <stop stop-color="#6366f1"/>
                                <stop offset="1" stop-color="#a855f7"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">RMBG <span class="logo-version">2.0</span></span>
            </div>
            <p class="header-tagline">AI-Powered Background Removal</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Upload Section -->
        <section id="upload-section" class="section upload-section">
            <div class="upload-card glass-card">
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <div class="upload-icon">
                            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="32" cy="32" r="30" stroke="url(#up-grad)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
                                <path d="M32 20V44M20 32L32 20L44 32" stroke="url(#up-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <defs>
                                    <linearGradient id="up-grad" x1="0" y1="0" x2="64" y2="64">
                                        <stop stop-color="#6366f1"/>
                                        <stop offset="1" stop-color="#a855f7"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <h2 class="drop-zone-title">Drop your image here</h2>
                        <p class="drop-zone-subtitle">or <span class="browse-link">browse files</span></p>
                        <p class="drop-zone-hint">Supports PNG, JPG, WEBP, BMP, TIFF — Max 20 MB</p>
                    </div>
                    <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/bmp,image/tiff" hidden>
                </div>
            </div>
        </section>

        <!-- Processing Section (hidden by default) -->
        <section id="processing-section" class="section processing-section hidden">
            <div class="glass-card processing-card">
                <div class="spinner"></div>
                <h2 class="processing-title">Removing background…</h2>
                <p class="processing-subtitle">This may take a moment depending on image size</p>
            </div>
        </section>

        <!-- Result Section (hidden by default) -->
        <section id="result-section" class="section result-section hidden">
            <div class="result-container">
                <!-- Before / After -->
                <div class="comparison-grid">
                    <div class="comparison-card glass-card">
                        <span class="comparison-label">Original</span>
                        <div class="image-wrapper">
                            <img id="original-image" alt="Original image">
                        </div>
                    </div>
                    <div class="comparison-card glass-card">
                        <span class="comparison-label result-label">Result</span>
                        <div class="image-wrapper checkered-bg">
                            <img id="result-image" alt="Background removed">
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="actions">
                    <button id="download-btn" class="btn btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download PNG
                    </button>
                    <button id="new-image-btn" class="btn btn-secondary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
                        </svg>
                        New Image
                    </button>
                </div>
            </div>
        </section>

        <!-- Error Toast -->
        <div id="error-toast" class="error-toast hidden">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span id="error-text"></span>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>Powered by <a href="https://huggingface.co/briaai/RMBG-2.0" target="_blank" rel="noopener">BRIA RMBG 2.0</a></p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
